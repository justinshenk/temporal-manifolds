setup:
  model: "Qwen/Qwen3-4B-Instruct-2507"
  seed: 0
  batch_size: 64
  dtype: "bfloat16"
  granularity: "fine"
  quadrature: "riemann-midpoint"

paths:
  data_loc: "./data/raw/refined_datasets"
  save_loc: "./results/explicit/(i)"

input:
  data_file: "temporal_scope_explicit_expanded_500_debiased.json"
  template: "{}\n\n{}\n{}"
  option_keys: [ "(i)", "(ii)" ]
  prompt_suffix: "("
  horizon: [ "ST", "LT" ]

output:
  filename: "(i)_explicit"

parameters:
  system_prompt: "Recommend an approach for the given scenario. Reply only with (i) or (ii)"
  steps: [ 20 ]
  metric_type: "option-logit"
